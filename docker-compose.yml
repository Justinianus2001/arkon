version: '3.8'

# Backend image built once, reused by api + workers
x-backend: &backend
  build:
    context: .
    dockerfile: Dockerfile
  image: arkon-backend:latest
  env_file: [.env]
  restart: always

services:
  # 1. API
  api:
    <<: *backend
    container_name: arkon_api
    ports:
      - "5055:5055"
    command: python -m uvicorn app.main:app --host 0.0.0.0 --port 5055
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:5055/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - dokploy-network

  # 2. Background worker (main queue)
  worker:
    <<: *backend
    container_name: arkon_worker
    command: python -m arq app.worker.WorkerSettings
    depends_on:
      api:
        condition: service_healthy
    networks:
      - dokploy-network

  # 3. Background worker (skills queue)
  worker_skills:
    <<: *backend
    container_name: arkon_worker_skills
    command: python -m arq app.worker.SkillWorkerSettings
    depends_on:
      api:
        condition: service_healthy
    networks:
      - dokploy-network

  # 4. Frontend (Next.js standalone)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:5055}
    image: arkon-frontend:latest
    container_name: arkon_frontend
    restart: always
    ports:
      - "3119:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:5055}
      - INTERNAL_API_URL=http://api:5055
    depends_on:
      api:
        condition: service_healthy
    networks:
      - dokploy-network

networks:
  dokploy-network:
    external: true